name: deploy

# Runs only after the `ci` workflow completes successfully on main.
on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]

# Avoid overlapping production deploys.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    # Skip if CI failed/was cancelled.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Deploys Convex functions to production AND builds the frontend with the
      # production Convex URL injected as VITE_CONVEX_URL.
      - name: Deploy Convex + build frontend
        run: npx convex deploy --cmd 'npm run build' --cmd-url-env-var-name VITE_CONVEX_URL
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=clarity --branch=main
