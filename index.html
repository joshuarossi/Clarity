<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clarity</title>

    <!-- Dark mode detection — must run before any stylesheet to prevent flash -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          if (stored === "dark" || stored === "light") {
            document.documentElement.dataset.theme = stored;
          } else {
            var prefersDark =
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches;
            document.documentElement.dataset.theme = prefersDark
              ? "dark"
              : "light";
          }
        } catch (e) {
          // localStorage may throw in private browsing — fall back to prefers-color-scheme
          try {
            var prefersDark =
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches;
            document.documentElement.dataset.theme = prefersDark
              ? "dark"
              : "light";
          } catch (e2) {
            document.documentElement.dataset.theme = "light";
          }
        }
      })();
    </script>

    <!-- Google Fonts: Inter (400, 500, 600) and JetBrains Mono (400, 500) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
